<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-CRM 2.0 | Dashboard Business</title>
    <style>
        :root {
            --primary: #61ce70;
            --secondary: #4054b2;
            --accent-gradient: linear-gradient(135deg, #61ce70 0%, #4054b2 100%);
            --bg-body: #f4f7fa;
            --bg-card: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --border: #edf2f7;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            --danger: #ff7675;
            --success: #00b894;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border: #333333;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        
        body { background-color: var(--bg-body); color: var(--text-main); padding: 20px; line-height: 1.5; }
        .container { max-width: 1300px; margin: 0 auto; }

        /* Header & Theme Toggle */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px;
            background: var(--accent-gradient);
            border-radius: 16px;
            color: white;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            position: relative;
        }

        .header-left h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; }
        .header-right { display: flex; align-items: center; gap: 15px; }

        .theme-switch {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Stats Grid */
        .stats-bar { display: flex; gap: 15px; margin-top: 15px; }
        .stat-badge { background: rgba(255,255,255,0.15); padding: 5px 15px; border-radius: 30px; font-size: 0.85rem; font-weight: 600; }

        /* Dashboard Layout */
        .main-layout { display: grid; grid-template-columns: 360px 1fr; gap: 30px; }
        @media (max-width: 1024px) { .main-layout { grid-template-columns: 1fr; } }

        /* Cards */
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; color: var(--secondary); font-weight: 700; }
        [data-theme="dark"] .card-header { color: var(--primary); }

        /* Forms */
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 6px; color: var(--text-muted); text-transform: uppercase; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: transparent;
            color: var(--text-main);
            font-size: 0.95rem;
        }
        input:focus { border-color: var(--primary); outline: none; }

        /* Buttons */
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s ease;
        }
        .btn-full { width: 100%; justify-content: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-sec { background: var(--secondary); color: white; }
        .btn-outline { border: 2px solid var(--border); background: transparent; color: var(--text-main); }
        .btn-outline:hover { background: var(--border); }
        .btn-danger { color: var(--danger); background: rgba(255,118,117,0.1); }
        .btn-danger:hover { background: var(--danger); color: white; }

        /* Tasks Table */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid var(--border); color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        .tag { padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; }
        .tag-high { background: #ffeaa7; color: #d35400; }
        .tag-mid { background: #dff9fb; color: #130f40; }
        .tag-low { background: #e3fcef; color: #00875a; }

        .client-label { font-weight: 700; color: var(--secondary); background: rgba(64, 84, 178, 0.1); padding: 2px 8px; border-radius: 4px; }

        /* Tools Bar */
        .tools-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            background: var(--text-main);
            color: var(--bg-card);
            display: none;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Print optimization */
        @media print {
            aside, .tools-bar, header, .btn-danger, .theme-switch { display: none !important; }
            body { background: white; padding: 0; }
            .card { box-shadow: none; border: 1px solid #ccc; }
            .main-layout { display: block; }
        }
    </style>
</head>
<body data-theme="light">

<div id="toast">Operazione completata!</div>

<div class="container">
    <header>
        <div class="header-left">
            <h1>Pro-CRM Business 2.0</h1>
            <div class="stats-bar">
                <div class="stat-badge">Clienti: <span id="count-clients">0</span></div>
                <div class="stat-badge">Task: <span id="count-tasks">0</span></div>
            </div>
        </div>
        <div class="header-right">
            <button class="theme-switch" onclick="app.toggleTheme()">
                <span id="theme-icon">🌙</span> <span id="theme-text">Dark Mode</span>
            </button>
        </div>
    </header>

    <div class="main-layout">
        <aside>
            <!-- Aggiunta Cliente -->
            <div class="card">
                <div class="card-header">Nuovo Cliente</div>
                <div class="field">
                    <label>Nome Azienda / Cliente</label>
                    <input type="text" id="new-client-name" placeholder="Es: Mario Rossi Srl">
                </div>
                <button class="btn btn-primary btn-full" onclick="app.addClient()">Salva Cliente</button>
            </div>

            <!-- Aggiunta Task -->
            <div class="card">
                <div class="card-header">Nuovo Task</div>
                <div class="field">
                    <label>Cliente</label>
                    <select id="task-client-id"></select>
                </div>
                <div class="field">
                    <label>Descrizione Attività</label>
                    <input type="text" id="task-desc" placeholder="Cosa devi fare?">
                </div>
                <div class="field">
                    <label>Data di Scadenza</label>
                    <input type="date" id="task-date">
                </div>
                <div class="field">
                    <label>Priorità</label>
                    <select id="task-priority">
                        <option value="bassa">Bassa</option>
                        <option value="media" selected>Media</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
                <button class="btn btn-sec btn-full" onclick="app.addTask()">Aggiungi al Calendario</button>
            </div>

            <!-- Backup Tools -->
            <div class="card">
                <div class="card-header">Backup & Dati</div>
                <div class="tools-bar" style="flex-direction: column;">
                    <button class="btn btn-outline btn-full" onclick="app.exportBackup()">Crea Backup (JSON)</button>
                    <button class="btn btn-outline btn-full" onclick="document.getElementById('import-file').click()">Carica Backup</button>
                    <input type="file" id="import-file" style="display:none" onchange="app.importBackup(event)">
                </div>
            </div>
        </aside>

        <main>
            <div class="tools-bar">
                <button class="btn btn-outline" onclick="window.print()">
                    🖨️ Scarica PDF / Stampa
                </button>
                <button class="btn btn-outline" onclick="app.exportCSV()">
                    📊 Esporta CSV
                </button>
            </div>

            <div class="card">
                <div class="card-header">Calendario Task</div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Cliente</th>
                                <th>Attività</th>
                                <th>Priorità</th>
                                <th>Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="task-body"></tbody>
                    </table>
                </div>
                <div id="no-tasks" style="text-align:center; padding:40px; color:var(--text-muted); display:none;">
                    Nessun task programmato.
                </div>
            </div>

            <div class="card">
                <div class="card-header">Elenco Clienti</div>
                <div id="client-list"></div>
            </div>
        </main>
    </div>
</div>

<script>
    const app = {
        data: {
            clients: JSON.parse(localStorage.getItem('pro_crm_v2_clients')) || [],
            tasks: JSON.parse(localStorage.getItem('pro_crm_v2_tasks')) || [],
            theme: localStorage.getItem('pro_crm_theme') || 'light'
        },

        init() {
            document.body.setAttribute('data-theme', this.data.theme);
            this.updateThemeUI();
            this.render();
        },

        // --- CORE ---
        save() {
            localStorage.setItem('pro_crm_v2_clients', JSON.stringify(this.data.clients));
            localStorage.setItem('pro_crm_v2_tasks', JSON.stringify(this.data.tasks));
            this.render();
        },

        showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        },

        // --- THEME ---
        toggleTheme() {
            this.data.theme = this.data.theme === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', this.data.theme);
            localStorage.setItem('pro_crm_theme', this.data.theme);
            this.updateThemeUI();
        },

        updateThemeUI() {
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            if(this.data.theme === 'dark') {
                icon.innerText = '☀️';
                text.innerText = 'Light Mode';
            } else {
                icon.innerText = '🌙';
                text.innerText = 'Dark Mode';
            }
        },

        // --- CLIENTS ---
        addClient() {
            const input = document.getElementById('new-client-name');
            const name = input.value.trim();
            if(!name) return;

            this.data.clients.push({ id: Date.now(), name });
            input.value = '';
            this.save();
            this.showToast('Cliente aggiunto!');
        },

        deleteClient(id) {
            if(!confirm('Eliminando il cliente cancellerai anche tutti i suoi task. Procedere?')) return;
            this.data.clients = this.data.clients.filter(c => c.id !== id);
            this.data.tasks = this.data.tasks.filter(t => t.clientId !== id);
            this.save();
        },

        // --- TASKS ---
        addTask() {
            const clientId = parseInt(document.getElementById('task-client-id').value);
            const desc = document.getElementById('task-desc').value.trim();
            const date = document.getElementById('task-date').value;
            const priority = document.getElementById('task-priority').value;

            if(!clientId || !desc || !date) {
                alert('Compila tutti i campi richiesti.');
                return;
            }

            this.data.tasks.push({ id: Date.now(), clientId, desc, date, priority });
            document.getElementById('task-desc').value = '';
            this.save();
            this.showToast('Task programmato!');
        },

        deleteTask(id) {
            this.data.tasks = this.data.tasks.filter(t => t.id !== id);
            this.save();
        },

        // --- BACKUP ---
        exportBackup() {
            const dataStr = JSON.stringify(this.data);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const link = document.createElement('a');
            link.setAttribute('href', dataUri);
            link.setAttribute('download', `backup_crm_${new Date().toISOString().slice(0,10)}.json`);
            link.click();
        },

        importBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(imported.clients && imported.tasks) {
                        this.data.clients = imported.clients;
                        this.data.tasks = imported.tasks;
                        this.save();
                        this.showToast('Backup ripristinato con successo!');
                    }
                } catch (err) {
                    alert('Errore nel caricamento del file backup.');
                }
            };
            reader.readAsText(file);
        },

        exportCSV() {
            if(this.data.tasks.length === 0) return;
            let csv = "Data,Cliente,Attivita,Priorita\n";
            this.data.tasks.forEach(t => {
                const c = this.data.clients.find(cl => cl.id === t.clientId);
                csv += `${t.date},"${c?c.name:'N/A'}", "${t.desc}", ${t.priority}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", "report_crm.csv");
            link.click();
        },

        // --- RENDERING ---
        render() {
            this.renderStats();
            this.renderClientSelectors();
            this.renderClientList();
            this.renderTaskList();
        },

        renderStats() {
            document.getElementById('count-clients').innerText = this.data.clients.length;
            document.getElementById('count-tasks').innerText = this.data.tasks.length;
        },

        renderClientSelectors() {
            const sel = document.getElementById('task-client-id');
            const options = this.data.clients.map(c => `<option value="${c.id}">${c.name}</option>`);
            sel.innerHTML = '<option value="">Scegli...</option>' + options.join('');
        },

        renderClientList() {
            const cont = document.getElementById('client-list');
            if(this.data.clients.length === 0) {
                cont.innerHTML = '<p style="font-size:0.9rem; color:var(--text-muted)">Nessun cliente attivo.</p>';
                return;
            }
            cont.innerHTML = this.data.clients.map(c => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border)">
                    <span>${c.name}</span>
                    <button class="btn btn-danger" style="padding:4px 8px; font-size:0.75rem" onclick="app.deleteClient(${c.id})">Rimuovi</button>
                </div>
            `).join('');
        },

        renderTaskList() {
            const tbody = document.getElementById('task-body');
            const noTasks = document.getElementById('no-tasks');
            
            if(this.data.tasks.length === 0) {
                tbody.innerHTML = '';
                noTasks.style.display = 'block';
                return;
            }
            noTasks.style.display = 'none';

            const sorted = [...this.data.tasks].sort((a,b) => new Date(a.date) - new Date(b.date));
            
            tbody.innerHTML = sorted.map(t => {
                const client = this.data.clients.find(c => c.id === t.clientId);
                const d = new Date(t.date).toLocaleDateString('it-IT', {day:'2-digit', month:'2-digit'});
                return `
                    <tr>
                        <td><strong>${d}</strong></td>
                        <td><span class="client-label">${client ? client.name : '???'}</span></td>
                        <td>${t.desc}</td>
                        <td><span class="tag tag-${t.priority === 'alta' ? 'high' : t.priority === 'media' ? 'mid' : 'low'}">${t.priority}</span></td>
                        <td><button class="btn btn-danger" style="padding:6px" onclick="app.deleteTask(${t.id})">Fatto</button></td>
                    </tr>
                `;
            }).join('');
        }
    };

    app.init();
</script>

</body>
</html>

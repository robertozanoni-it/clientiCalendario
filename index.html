<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workstation CRM - Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: #f1f5f9;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .card { 
            background-color: #1e293b; 
            border: 1px solid #334155; 
            border-radius: 1rem; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); 
        }
        
        input, select, textarea { 
            background-color: #0f172a !important; 
            border: 1px solid #334155 !important; 
            color: #f1f5f9 !important;
            font-size: 0.875rem !important;
        }
        
        input:focus, select:focus {
            border-color: #3b82f6 !important;
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        /* Calendario UI */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background-color: #334155; border: 1px solid #334155; border-radius: 0.5rem; overflow: hidden; }
        .calendar-day { background-color: #1e293b; min-height: 40px; padding: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: background-color 0.2s; }
        .calendar-day:hover { background-color: #334155; }
        .calendar-day.today { background-color: #1e3a8a; color: #60a5fa; font-weight: bold; }
        .calendar-day.selected { border: 2px solid #3b82f6; z-index: 10; }
        .calendar-day.other-month { color: #475569; cursor: default; }
        .calendar-day.other-month:hover { background-color: #1e293b; }

        .calendar-popup {
            position: absolute;
            z-index: 100;
            width: 300px;
            display: none;
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .task-card {
            transition: all 0.2s ease-in-out;
            border-width: 1px;
            border-style: solid;
            border-left-width: 4px;
        }
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .editable-task-input {
            background: transparent !important;
            border: 1px solid transparent !important;
            padding: 4px 8px !important;
            width: 100%;
            font-weight: 600;
            color: #f1f5f9 !important;
            cursor: text;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }
        
        .editable-task-input:hover { background: rgba(255, 255, 255, 0.05) !important; }

        .editable-task-input:focus {
            background: #0f172a !important;
            border-color: #3b82f6 !important;
            outline: none !important;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1) !important;
        }

        .editable-task-select, .editable-task-date {
            background: transparent !important;
            border: none !important;
            padding: 0 !important;
            font-size: 10px !important;
            font-weight: 700 !important;
            letter-spacing: 0.05em !important;
            text-transform: uppercase !important;
            cursor: pointer !important;
            color: inherit !important;
            min-width: 80px;
        }
        
        .editable-task-date::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            opacity: 0;
            width: 0;
            position: absolute;
        }

        .date-display-wrapper { position: relative; display: inline-flex; align-items: center; }
        .date-text { pointer-events: none; position: absolute; left: 0; background: transparent; z-index: 5; }
        .status-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
    </style>
</head>
<body class="min-h-screen">

    <div class="max-w-[1400px] mx-auto p-4 md:p-8">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight text-white">Workstation <span class="text-blue-500">CRM</span></h1>
                <p class="text-xs text-slate-500 font-medium uppercase tracking-widest mt-1">Gestione Clienti & Task</p>
            </div>
            <div class="flex flex-wrap gap-3">
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importBackup(event)">
                <button onclick="document.getElementById('importFile').click()" class="text-[11px] px-3 py-1.5 rounded-lg border border-slate-700 font-bold text-slate-300 hover:bg-slate-800 transition">Importa JSON</button>
                <button onclick="exportBackup()" class="text-[11px] px-3 py-1.5 rounded-lg border border-slate-700 font-bold text-slate-300 hover:bg-slate-800 transition">Esporta Backup</button>
                <button onclick="downloadPDF()" class="text-[11px] px-3 py-1.5 rounded-lg bg-red-900/20 font-bold text-red-400 hover:bg-red-900/40 transition">Esporta PDF</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- COLONNA SINISTRA -->
            <div class="space-y-6">
                
                <!-- Form Nuova Attività -->
                <div class="card p-6 border-t-4 border-t-blue-500">
                    <h2 class="text-sm font-bold uppercase tracking-wider text-slate-200 mb-6 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                        Nuovo Task
                    </h2>

                    <form id="taskForm" class="space-y-4">
                        <input type="text" id="taskTitle" placeholder="Cosa devi fare?" required class="w-full rounded-xl px-4 py-3 outline-none">
                        
                        <div class="grid grid-cols-2 gap-4">
                            <select id="taskClient" class="rounded-xl px-4 py-3 outline-none cursor-pointer appearance-none">
                                <option value="">Nessun Cliente</option>
                            </select>
                            <div class="relative">
                                <div class="flex items-center relative">
                                    <span id="taskDateText" class="absolute left-4 pointer-events-none text-slate-400 text-sm"></span>
                                    <input type="date" id="taskDate" required 
                                           onclick="toggleCalendar(event, 'taskDate', 'calendarCard')"
                                           oninput="updateTaskDateDisplay()"
                                           class="w-full rounded-xl px-4 py-3 outline-none pr-10 cursor-pointer opacity-0 focus:opacity-100">
                                    <button type="button" onclick="toggleCalendar(event, 'taskDate', 'calendarCard')" class="absolute right-3 text-slate-400 hover:text-blue-500 transition">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                                    </button>
                                </div>
                                <div id="calendarCard" class="calendar-popup card p-4 mt-2 right-0 top-full">
                                    <div class="flex items-center justify-between mb-2">
                                        <h3 id="monthDisplay" class="text-[10px] font-bold uppercase tracking-widest text-blue-400">Mese</h3>
                                        <div class="flex gap-1">
                                            <button type="button" onclick="changeMonth(-1, event)" class="p-1 hover:bg-slate-800 rounded text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg></button>
                                            <button type="button" onclick="changeMonth(1, event)" class="p-1 hover:bg-slate-800 rounded text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg></button>
                                        </div>
                                    </div>
                                    <div class="calendar-grid text-center text-[8px] font-bold text-slate-500 mb-1">
                                        <div>L</div><div>M</div><div>M</div><div>G</div><div>V</div><div>S</div><div>D</div>
                                    </div>
                                    <div id="calendarBody" class="calendar-grid text-[10px]"></div>
                                </div>
                            </div>
                        </div>
                        
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-bold transition shadow-lg shadow-blue-900/20">
                            Aggiungi all'elenco
                        </button>
                    </form>
                </div>

                <!-- Anagrafica Clienti -->
                <div class="card p-6">
                    <h2 class="text-sm font-bold uppercase tracking-wider text-slate-200 mb-4 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0" /></svg>
                        Clienti
                    </h2>
                    
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <input type="text" id="name" placeholder="Nome" class="rounded-xl px-3 py-2 outline-none">
                        <input type="email" id="email" placeholder="Email" class="rounded-xl px-3 py-2 outline-none">
                        <input type="tel" id="tel" placeholder="Telefono" class="rounded-xl px-3 py-2 outline-none">
                        <div class="flex gap-2">
                            <input type="color" id="clientColor" value="#3b82f6" class="w-12 h-10 rounded-xl cursor-pointer p-1">
                            <button onclick="addClient()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-xl font-bold transition">Aggiungi</button>
                        </div>
                    </div>

                    <div class="relative mt-4">
                        <select id="clientDropdown" onchange="handleClientAction(this.value)" class="w-full rounded-xl px-4 py-3 outline-none cursor-pointer appearance-none">
                            <option value="">Gestisci Clienti Registrati...</option>
                        </select>
                    </div>
                </div>

                <!-- Filtro Calendario -->
                <div class="card p-6 overflow-hidden">
                    <div onclick="toggleStaticCalendarVisibility()" class="w-full flex items-center justify-between text-xs font-bold uppercase tracking-widest text-blue-400 hover:text-blue-300 transition cursor-pointer" id="staticCalendarToggle">
                        <span>Filtra per Data</span>
                        <svg id="staticCalendarIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </div>
                    
                    <div id="staticCalendarContainer" class="hidden mt-4">
                        <div class="flex items-center justify-between mb-4">
                            <h3 id="monthDisplayStatic" class="text-xs font-bold uppercase tracking-widest text-slate-400">Mese</h3>
                            <div class="flex gap-1">
                                <button onclick="changeMonth(-1, event, true)" class="p-1 hover:bg-slate-800 rounded text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg></button>
                                <button onclick="changeMonth(1, event, true)" class="p-1 hover:bg-slate-800 rounded text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg></button>
                            </div>
                        </div>
                        <div class="calendar-grid text-center text-[9px] font-bold text-slate-500 mb-1">
                            <div>L</div><div>M</div><div>M</div><div>G</div><div>V</div><div>S</div><div>D</div>
                        </div>
                        <div id="calendarBodyStatic" class="calendar-grid text-[11px]"></div>
                    </div>
                </div>

                <!-- Task Permanenti Dropdown -->
                <div class="card p-6 overflow-hidden">
                    <div class="w-full flex items-center justify-between text-xs font-bold uppercase tracking-widest transition mb-0">
                        <div onclick="togglePermTasksVisibility()" class="flex items-center gap-2 cursor-pointer text-amber-400 hover:text-amber-300 flex-grow py-1" id="permTasksToggle">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>
                            Task Permanenti
                            <svg id="permTasksIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform duration-300 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                        </div>
                        <button onclick="addPermanentTask(event)" class="bg-amber-600/20 hover:bg-amber-600/40 text-amber-400 px-3 py-1 rounded-lg text-[9px] font-bold border border-amber-500/30 transition">Aggiungi</button>
                    </div>
                    
                    <div id="permTasksContainer" class="hidden mt-4">
                        <div id="permTaskList" class="space-y-3 max-h-[400px] overflow-y-auto pr-1"></div>
                    </div>
                </div>

            </div>

            <!-- COLONNA DESTRA -->
            <div class="space-y-6">
                <div class="card p-6 min-h-[600px] flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <h2 id="taskListTitle" class="text-sm font-bold uppercase tracking-wider text-slate-200">Task Attivi</h2>
                            <div class="flex items-center gap-2">
                                <span id="taskCounter" class="text-[10px] text-blue-400 font-bold">0 Task</span>
                                <button id="clearFilterBtn" onclick="clearFilter()" class="hidden text-[10px] bg-slate-700/50 px-2 py-0.5 rounded text-slate-300 hover:bg-slate-700 transition">Mostra tutti</button>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="clearPastTasks()" class="text-[10px] bg-slate-800/40 px-3 py-1 rounded-full text-slate-400 font-bold border border-slate-700/50 hover:bg-slate-800 transition">Svuota Passati</button>
                            <button onclick="clearCompleted()" class="text-[10px] bg-red-900/20 px-3 py-1 rounded-full text-red-400 font-bold border border-red-900/50 hover:bg-red-900/40 transition">Svuota Completati</button>
                        </div>
                    </div>
                    <div id="taskList" class="space-y-3 overflow-y-auto flex-grow pr-1"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Calendario shared popup -->
    <div id="calendarCardList" class="calendar-popup card p-4">
        <div class="flex items-center justify-between mb-2">
            <h3 class="text-[10px] font-bold uppercase tracking-widest text-blue-400">Mese</h3>
            <div class="flex gap-1">
                <button type="button" onclick="changeMonth(-1, event)" class="p-1 hover:bg-slate-800 rounded text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg></button>
                <button type="button" onclick="changeMonth(1, event)" class="p-1 hover:bg-slate-800 rounded text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg></button>
            </div>
        </div>
        <div class="calendar-grid text-center text-[8px] font-bold text-slate-500 mb-1">
            <div>L</div><div>M</div><div>M</div><div>G</div><div>V</div><div>S</div><div>D</div>
        </div>
        <div class="calendar-grid text-[10px]"></div>
    </div>

    <!-- Modal Modifica Cliente -->
    <div id="clientModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[150] hidden flex items-center justify-center p-4">
        <div class="card w-full max-w-md p-8 relative">
            <button onclick="closeClientModal()" class="absolute top-4 right-4 text-slate-500 hover:text-white"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
            <h2 class="text-lg font-bold mb-6 text-white">Modifica Cliente</h2>
            <form id="editClientForm" class="space-y-4">
                <input type="hidden" id="editClientId">
                <div><label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Nome</label><input type="text" id="editClientName" required class="w-full rounded-xl px-4 py-3 mt-1"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Email</label><input type="email" id="editClientEmail" class="w-full rounded-xl px-4 py-3 mt-1"></div>
                    <div><label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Telefono</label><input type="tel" id="editClientTel" class="w-full rounded-xl px-4 py-3 mt-1"></div>
                </div>
                <div><label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Colore</label><input type="color" id="editClientColor" class="w-full h-12 rounded-xl mt-1 cursor-pointer p-1"></div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="deleteClientFromModal()" class="bg-red-900/20 text-red-400 px-6 py-3 rounded-xl font-bold transition">Elimina</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold transition shadow-lg">Salva</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-8 py-3 rounded-2xl text-xs font-bold shadow-2xl opacity-0 transition-all duration-300 pointer-events-none translate-y-4 z-50"><span id="toastMsg"></span></div>

    <script>
        let clients = JSON.parse(localStorage.getItem('crm_v8_clients')) || [];
        let tasks = JSON.parse(localStorage.getItem('crm_v8_tasks')) || [];
        let permTasks = JSON.parse(localStorage.getItem('crm_v8_perm_tasks')) || [];
        let currentDate = new Date(), selectedFilterDate = null, activeCalendarTarget = null, activeCalendarCard = null;

        function save() {
            localStorage.setItem('crm_v8_clients', JSON.stringify(clients));
            localStorage.setItem('crm_v8_tasks', JSON.stringify(tasks));
            localStorage.setItem('crm_v8_perm_tasks', JSON.stringify(permTasks));
            render();
        }

        function showToast(msg) {
            const t = document.getElementById('toast'); document.getElementById('toastMsg').innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-4'); t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { t.classList.add('opacity-0', 'translate-y-4'); t.classList.remove('opacity-100', 'translate-y-0'); }, 2500);
        }

        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        function addClient() {
            const name = document.getElementById('name').value; if(!name) return;
            clients.push({ id: Date.now().toString(), name, email: document.getElementById('email').value, tel: document.getElementById('tel').value, color: document.getElementById('clientColor').value });
            document.getElementById('name').value = ''; document.getElementById('email').value = ''; document.getElementById('tel').value = ''; save(); showToast('Cliente aggiunto');
        }

        function handleClientAction(id) {
            if(!id) return; const client = clients.find(c => c.id === id); if(!client) return;
            document.getElementById('editClientId').value = client.id; document.getElementById('editClientName').value = client.name;
            document.getElementById('editClientEmail').value = client.email || ''; document.getElementById('editClientTel').value = client.tel || '';
            document.getElementById('editClientColor').value = client.color || '#3b82f6'; document.getElementById('clientModal').classList.remove('hidden');
            document.getElementById('clientDropdown').value = "";
        }

        function closeClientModal() { document.getElementById('clientModal').classList.add('hidden'); }

        document.getElementById('editClientForm').addEventListener('submit', (e) => {
            e.preventDefault(); const id = document.getElementById('editClientId').value; const client = clients.find(c => c.id === id);
            if(client) { client.name = document.getElementById('editClientName').value; client.email = document.getElementById('editClientEmail').value; client.tel = document.getElementById('editClientTel').value; client.color = document.getElementById('editClientColor').value; save(); closeClientModal(); }
        });

        function deleteClientFromModal() {
            const id = document.getElementById('editClientId').value;
            if(id && confirm('Rimuovere il cliente?')) {
                clients = clients.filter(c => c.id !== id);
                tasks.forEach(t => { if(t.client === id) t.client = ''; });
                permTasks.forEach(t => { if(t.client === id) t.client = ''; });
                save(); closeClientModal();
            }
        }

        function getClientColor(clientId) {
            const client = clients.find(c => c.id === clientId);
            if (client && client.color) {
                const hex = client.color, r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
                return { bg: `rgba(${r}, ${g}, ${b}, 0.1)`, border: hex, text: '#f1f5f9' };
            }
            return { bg: 'rgba(30, 41, 59, 0.4)', border: 'rgba(51, 65, 85, 0.5)', text: '#f1f5f9' };
        }

        document.getElementById('taskForm').addEventListener('submit', (e) => {
            e.preventDefault();
            tasks.push({ id: Date.now().toString(), title: document.getElementById('taskTitle').value, client: document.getElementById('taskClient').value, date: document.getElementById('taskDate').value, completed: false });
            e.target.reset(); save(); showToast('Task creato');
        });

        function addPermanentTask(e) { if(e) e.stopPropagation(); permTasks.push({ id: 'p' + Date.now().toString(), title: 'Nuovo Task Permanente', client: '', completed: false }); const container = document.getElementById('permTasksContainer'); if(container.classList.contains('hidden')) togglePermTasksVisibility(); save(); }
        function togglePermTask(id) { const t = permTasks.find(x => x.id === id); if(t) t.completed = !t.completed; save(); }
        function deletePermTask(id) { if(confirm('Eliminare?')) { permTasks = permTasks.filter(x => x.id !== id); save(); } }
        function updatePermTaskTitle(id, val) { const t = permTasks.find(x => x.id === id); if(t) { t.title = val; localStorage.setItem('crm_v8_perm_tasks', JSON.stringify(permTasks)); } }
        function updatePermTaskClient(id, val) { const t = permTasks.find(x => x.id === id); if(t) { t.client = val; save(); } }

        function toggleCalendar(e, targetId, cardId) {
            e.stopPropagation(); const card = document.getElementById(cardId), target = document.getElementById(targetId);
            if (activeCalendarCard) activeCalendarCard.style.display = 'none';
            if (activeCalendarCard === card && activeCalendarTarget === target) { activeCalendarCard = null; return; }
            activeCalendarTarget = target; activeCalendarCard = card;
            if (cardId === 'calendarCardList') { const rect = target.getBoundingClientRect(); card.style.position = 'fixed'; card.style.top = (rect.bottom + 5) + 'px'; card.style.left = rect.left + 'px'; }
            card.style.display = 'block'; renderCalendar(); renderStaticCalendar();
        }

        function selectDate(dateStr, e) {
            if (e) e.stopPropagation();
            if (activeCalendarTarget) {
                activeCalendarTarget.value = dateStr;
                if (activeCalendarTarget.id === 'taskDate') updateTaskDateDisplay();
                if (activeCalendarTarget.dataset.taskId) updateTaskDate(activeCalendarTarget.dataset.taskId, dateStr);
            } else { selectedFilterDate = dateStr; showToast(`Filtro: ${new Date(dateStr).toLocaleDateString('it-IT')}`); }
            if (activeCalendarCard) activeCalendarCard.style.display = 'none';
            activeCalendarCard = null; render();
        }

        function updateTaskDate(id, date) { const t = tasks.find(x => x.id === id); if(t) { t.date = date; save(); } }
        function updateTaskTitle(id, val) { const t = tasks.find(x => x.id === id); if(t) { t.title = val; localStorage.setItem('crm_v8_tasks', JSON.stringify(tasks)); renderStaticCalendar(); } }
        function updateTaskClient(id, val) { const t = tasks.find(x => x.id === id); if(t) { t.client = val; save(); } }
        function toggleTask(id) { const t = tasks.find(x => x.id === id); if(t) t.completed = !t.completed; save(); }
        function deleteTask(id) { if(confirm('Eliminare?')) { tasks = tasks.filter(x => x.id !== id); save(); } }
        function moveTaskToTomorrow(id) {
            const t = tasks.find(x => x.id === id);
            if(t) { const [y, m, d] = t.date.split('-').map(Number); const date = new Date(y, m - 1, d + 1); t.date = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; save(); }
        }

        function clearCompleted() { if(confirm('Svuota completati?')) { tasks = tasks.filter(t => !t.completed); save(); } }
        function clearPastTasks() { const today = new Date().toISOString().split('T')[0]; if(confirm('Svuota passati?')) { tasks = tasks.filter(t => t.date >= today); save(); } }
        function clearFilter() { selectedFilterDate = null; render(); }
        function toggleStaticCalendarVisibility() { const c = document.getElementById('staticCalendarContainer'), i = document.getElementById('staticCalendarIcon'); c.classList.toggle('hidden'); i.style.transform = c.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)'; }
        function togglePermTasksVisibility() { const c = document.getElementById('permTasksContainer'), i = document.getElementById('permTasksIcon'); c.classList.toggle('hidden'); i.style.transform = c.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)'; }
        function changeMonth(dir, e, isStatic) { if(e) e.stopPropagation(); currentDate.setMonth(currentDate.getMonth() + dir); if(isStatic) renderStaticCalendar(); else renderCalendar(); }

        function renderCalendar() {
            if (!activeCalendarCard) return; const body = activeCalendarCard.querySelector('.calendar-grid:last-child'), h = activeCalendarCard.querySelector('h3');
            body.innerHTML = ''; const y = currentDate.getFullYear(), m = currentDate.getMonth(); h.innerText = new Intl.DateTimeFormat('it-IT', { month: 'long', year: 'numeric' }).format(currentDate);
            const first = (new Date(y, m, 1).getDay() || 7) - 1, last = new Date(y, m + 1, 0).getDate();
            for(let i=0; i<first; i++) body.innerHTML += `<div class="calendar-day other-month"></div>`;
            for(let i=1; i<=last; i++) {
                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`, isToday = dStr === new Date().toISOString().split('T')[0];
                const dayTasks = tasks.filter(t => t.date === dStr && !t.completed);
                let dot = ''; if(dayTasks.length > 0) { const c = clients.find(cl => cl.id === dayTasks[0].client); dot = `<div class="absolute bottom-1 w-1.5 h-1.5 rounded-full" style="background-color: ${c ? c.color : '#3b82f6'}"></div>`; }
                body.innerHTML += `<div class="calendar-day ${isToday ? 'today' : ''} ${dStr === (activeCalendarTarget ? activeCalendarTarget.value : '') ? 'selected' : ''}" onclick="selectDate('${dStr}', event)"><span>${i}</span>${dot}</div>`;
            }
        }

        function renderStaticCalendar() {
            const body = document.getElementById('calendarBodyStatic'); if(!body) return; body.innerHTML = '';
            const y = currentDate.getFullYear(), m = currentDate.getMonth(); document.getElementById('monthDisplayStatic').innerText = new Intl.DateTimeFormat('it-IT', { month: 'long', year: 'numeric' }).format(currentDate);
            const first = (new Date(y, m, 1).getDay() || 7) - 1, last = new Date(y, m + 1, 0).getDate();
            for(let i=0; i<first; i++) body.innerHTML += `<div class="calendar-day other-month"></div>`;
            for(let i=1; i<=last; i++) {
                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`, isToday = dStr === new Date().toISOString().split('T')[0];
                const dayTasks = tasks.filter(t => t.date === dStr && !t.completed);
                let dot = ''; if(dayTasks.length > 0) { const c = clients.find(cl => cl.id === dayTasks[0].client); dot = `<div class="absolute bottom-1 w-1.5 h-1.5 rounded-full" style="background-color: ${c ? c.color : '#3b82f6'}"></div>`; }
                body.innerHTML += `<div class="calendar-day ${isToday ? 'today' : ''} ${dStr === selectedFilterDate ? 'selected' : ''}" onclick="selectDate('${dStr}', event)"><span>${i}</span>${dot}</div>`;
            }
        }

        function render() {
            const curC = document.getElementById('taskClient').value;
            document.getElementById('permTaskList').innerHTML = permTasks.length ? permTasks.map(t => {
                const c = getClientColor(t.client);
                return `<div class="task-card flex items-start gap-3 p-3 rounded-xl group relative border-amber-500/20" style="background-color: ${c.bg}; border-left-color: ${c.border}">
                    <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="togglePermTask('${t.id}')" class="mt-1 w-4 h-4 cursor-pointer">
                    <div class="flex-grow min-w-0"><input type="text" value="${escapeHtml(t.title)}" onblur="updatePermTaskTitle('${t.id}', this.value)" class="editable-task-input ${t.completed ? 'line-through opacity-50' : ''} !text-xs">
                        <select onchange="updatePermTaskClient('${t.id}', this.value)" style="color: ${c.border === 'rgba(51, 65, 85, 0.5)' ? '#94a3b8' : c.border}" class="editable-task-select status-badge font-black">
                            <option value="">Personale</option>${clients.map(cl => `<option value="${cl.id}" ${t.client === cl.id ? 'selected' : ''} style="color: ${cl.color}">${escapeHtml(cl.name)}</option>`).join('')}
                        </select>
                    </div>
                    <button onclick="deletePermTask('${t.id}')" class="opacity-0 group-hover:opacity-100 p-1 text-slate-400 hover:text-red-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" /></svg></button>
                </div>`;
            }).join('') : `<div class="text-center py-10 opacity-20 text-[10px] uppercase">Nessun task permanente</div>`;

            const listT = document.getElementById('taskListTitle'), clearB = document.getElementById('clearFilterBtn');
            if(selectedFilterDate) { listT.innerText = `Task del ${new Date(selectedFilterDate).toLocaleDateString('it-IT')}`; clearB.classList.remove('hidden'); }
            else { listT.innerText = 'Task Attivi'; clearB.classList.add('hidden'); }

            document.getElementById('taskClient').innerHTML = '<option value="">Nessun Cliente</option>' + clients.map(c => `<option value="${c.id}" style="color: ${c.color}">${escapeHtml(c.name)}</option>`).join('');
            document.getElementById('taskClient').value = curC;
            document.getElementById('clientDropdown').innerHTML = '<option value="">Gestisci Clienti...</option>' + clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

            let filtered = selectedFilterDate ? tasks.filter(t => t.date === selectedFilterDate) : [...tasks];
            filtered.sort((a,b) => new Date(a.date) - new Date(b.date));
            document.getElementById('taskCounter').innerText = `${tasks.filter(t => !t.completed).length} Task attivi`;
            document.getElementById('taskList').innerHTML = filtered.length ? filtered.map(t => {
                const c = getClientColor(t.client);
                return `<div class="task-card flex items-start gap-3 p-4 rounded-xl group relative" style="background-color: ${c.bg}; border-color: ${c.border}">
                    <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTask('${t.id}')" class="mt-1.5 w-4 h-4 cursor-pointer">
                    <div class="flex-grow min-w-0"><input type="text" value="${escapeHtml(t.title)}" onblur="updateTaskTitle('${t.id}', this.value)" class="editable-task-input ${t.completed ? 'line-through opacity-50' : ''}">
                        <div class="flex items-center gap-3 mt-1 ml-2">
                            <select onchange="updateTaskClient('${t.id}', this.value)" style="color: ${c.border === 'rgba(51, 65, 85, 0.5)' ? '#94a3b8' : c.border}" class="editable-task-select status-badge font-black">
                                <option value="">Personale</option>${clients.map(cl => `<option value="${cl.id}" ${t.client === cl.id ? 'selected' : ''} style="color: ${cl.color}">${escapeHtml(cl.name)}</option>`).join('')}
                            </select>
                            <div class="date-display-wrapper"><span class="date-text status-badge ${t.completed ? 'opacity-50' : ''}">${new Date(t.date).toLocaleDateString('it-IT')}</span><input type="date" id="date-${t.id}" data-task-id="${t.id}" value="${t.date}" onclick="toggleCalendar(event, 'date-${t.id}', 'calendarCardList')" onchange="updateTaskDate('${t.id}', this.value)" class="editable-task-date opacity-0 cursor-pointer"></div>
                        </div>
                    </div>
                    <div class="flex flex-col gap-1 opacity-0 group-hover:opacity-100">
                        <button onclick="moveTaskToTomorrow('${t.id}')" class="p-1 text-slate-400 hover:text-blue-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M13 5l7 7-7 7M5 5l7 7-7 7" stroke-width="2" /></svg></button>
                        <button onclick="deleteTask('${t.id}')" class="p-1 text-slate-400 hover:text-red-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" /></svg></button>
                    </div>
                </div>`;
            }).join('') : `<div class="text-center py-20 opacity-20 text-[10px] uppercase">Nessun impegno</div>`;
            renderStaticCalendar();
        }

        function exportBackup() { const d = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({clients, tasks, permTasks})); const a = document.createElement('a'); a.href = d; a.download = 'crm_backup.json'; a.click(); }
        function importBackup(event) {
            const f = event.target.files[0]; if (!f) return; const r = new FileReader();
            r.onload = (e) => { try { const i = JSON.parse(e.target.result); clients = i.clients || []; tasks = i.tasks || []; permTasks = i.permTasks || []; save(); showToast('Backup ripristinato'); } catch(err) { showToast('Errore file'); } }; r.readAsText(f);
        }
        function downloadPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text("CRM TASKS", 14, 20);
            doc.autoTable({ head: [['Cliente', 'Attività', 'Data']], body: tasks.map(t => { const c = clients.find(cl => cl.id === t.client); return [c ? c.name : 'Personale', t.title, new Date(t.date).toLocaleDateString('it-IT')]; }), startY: 25 }); doc.save("crm_tasks.pdf");
        }
        function getLocalToday() { const now = new Date(); return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`; }
        function updateTaskDateDisplay() { const v = document.getElementById('taskDate').value; document.getElementById('taskDateText').innerText = v ? new Date(v).toLocaleDateString('it-IT') : 'gg/mm/aaaa'; }
        window.onload = () => { document.getElementById('taskDate').value = getLocalToday(); updateTaskDateDisplay(); render(); };
        document.addEventListener('click', (e) => { if (activeCalendarCard && !activeCalendarCard.contains(e.target)) { activeCalendarCard.style.display = 'none'; activeCalendarCard = null; } });
    </script>
</body>
</html>
